# nginx-auth-ldap example configuration
#
# This module supports two connection modes:
#   stateless on  (default) — connect on-demand, close after use, no idle connections
#   stateless off            — pre-established persistent connection pool

http {
    # Optional: enable caching so repeated auth requests skip LDAP
    auth_ldap_cache_enabled on;
    auth_ldap_cache_expiration_time 10m;
    auth_ldap_cache_size 500;

    # Optional: DNS resolver for LDAP hostname resolution
    auth_ldap_resolver 8.8.8.8;

    # ========================================================================
    # Server 1: Stateless (default) — recommended for most use cases
    # ========================================================================
    ldap_server ldap_stateless {
        url ldap://ldap.example.com:389/DC=example,DC=com?uid?sub?(objectClass=person);
        binddn "CN=svc-nginx,OU=ServiceAccounts,DC=example,DC=com";
        binddn_passwd "s3cret";
        group_attribute member;
        group_attribute_is_dn on;
        require valid_user;
        search_attributes mail displayName department;

        # Tight timeouts for stateless mode
        connect_timeout 3s;
        bind_timeout 2s;
        request_timeout 5s;

        # Inject custom headers on auth success
        set_auth_header X-Auth-User $remote_user;
        set_auth_header X-Auth-Role editor;
    }

    # ========================================================================
    # Server 2: Connection pool — for high-traffic endpoints
    # ========================================================================
    ldap_server ldap_pool {
        url ldap://ldap.example.com:389/DC=example,DC=com?uid?sub?(objectClass=person);
        binddn "CN=svc-nginx,OU=ServiceAccounts,DC=example,DC=com";
        binddn_passwd "s3cret";
        group_attribute member;
        group_attribute_is_dn on;
        require valid_user;

        # Pool mode configuration
        stateless off;
        connections 5;
        reconnect_timeout 10s;
    }

    # ========================================================================
    # Server 3: LDAPS with certificate verification
    # ========================================================================
    ldap_server ldap_secure {
        url ldaps://ldap.example.com:636/DC=example,DC=com?uid?sub?(objectClass=person);
        binddn "CN=svc-nginx,OU=ServiceAccounts,DC=example,DC=com";
        binddn_passwd "s3cret";
        require valid_user;
        ssl_check_cert full;
        ssl_ca_file /etc/ssl/certs/ca-certificates.crt;
    }

    # ========================================================================
    # Server 4: Multi-rule authorization
    # ========================================================================
    ldap_server ldap_restrictive {
        url ldap://ldap.example.com:389/DC=example,DC=com?uid?sub?(objectClass=person);
        binddn "CN=svc-nginx,OU=ServiceAccounts,DC=example,DC=com";
        binddn_passwd "s3cret";
        group_attribute member;
        group_attribute_is_dn on;

        # Require user to be in ALL specified groups (satisfy all)
        require group "CN=Admins,OU=Groups,DC=example,DC=com";
        require group "CN=VPN Users,OU=Groups,DC=example,DC=com";
        satisfy all;
        require valid_user;
    }

    # ========================================================================
    # Location examples
    # ========================================================================

    server {
        listen 80;
        server_name example.com;

        # No auth — public
        location /public {
            root /var/www/public;
        }

        # Basic auth with single LDAP server (stateless)
        location /private {
            auth_ldap "Restricted Area";
            auth_ldap_servers ldap_stateless;
            proxy_pass http://internal-app:8080;
        }

        # Pool mode for high-traffic API
        location /api {
            auth_ldap "API Authentication";
            auth_ldap_servers ldap_pool;
            proxy_pass http://api-backend:3000;
        }

        # Failover: try ldap_stateless first, then ldap_restrictive
        location /admin {
            auth_ldap "Admin Area";
            auth_ldap_servers ldap_restrictive ldap_stateless;
            proxy_pass http://admin-panel:9090;
        }
    }

    # HTTPS with LDAPS backend
    server {
        listen 443 ssl;
        server_name secure.example.com;

        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        location / {
            auth_ldap "Secure Area";
            auth_ldap_servers ldap_secure;
            proxy_pass http://secure-app:8443;
        }
    }
}
